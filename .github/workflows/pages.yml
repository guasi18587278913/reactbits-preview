name: 部署到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: 构建静态网站
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 代码检查
        run: npm run lint

      - name: 构建 GitHub Pages 静态文件
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: 关闭 Jekyll 处理
        run: touch out/.nojekyll

      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out
          include-hidden-files: true

  deploy:
    name: 发布网站
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
